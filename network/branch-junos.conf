/* ==========================================================================
   ACME RETAIL — BRANCH UPLINK FILTER (Juniper Junos)
   Branch stores (10.60.0.0/16) talk to shared services only. Return traffic
   is stateful; everything else is discarded. RuleHawk audits this file with
   the same segmentation policy as the core.
   ========================================================================== */
firewall {
    family inet {
        filter BRANCH-UPLINK {
            term pos-to-services {
                from {
                    source-address 10.60.0.0/16;
                    destination-address 10.50.0.0/16;
                    protocol tcp;
                    destination-port 443;
                }
                then accept;
            }
            term dns {
                from {
                    source-address 10.60.0.0/16;
                    destination-address 10.50.0.53/32;
                    protocol udp;
                    destination-port 53;
                }
                then accept;
            }
            term return-traffic {
                from {
                    protocol tcp;
                    tcp-established;
                }
                then accept;
            }
            term default-deny {
                then discard;
            }
        }
    }
}
