! ============================================================================
! ACME RETAIL — EDGE FIREWALL (Cisco ASA)
! Internet edge. Owns the Zscaler egress path: user web traffic to the ZEN
! ranges, and the GRE + IPsec tunnels from the egress routers.
! Gated by RuleHawk on every PR:
!   - policy/segmentation.json  (zone isolation must hold)
!   - policy/egress-edge.json   (Zscaler flows must provably WORK)
! ============================================================================

object-group network ZSCALER_ZEN
 network-object 185.46.212.0 255.255.254.0
 network-object 104.129.192.0 255.255.240.0

object-group network CORP_USERS
 network-object 10.20.0.0 255.255.0.0

! --- Zscaler ZIA: user web traffic to the enforcement nodes ----------------
access-list OUTSIDE-EGRESS extended permit tcp object-group CORP_USERS object-group ZSCALER_ZEN eq www 443 9400 9480
access-list OUTSIDE-EGRESS extended permit udp object-group CORP_USERS object-group ZSCALER_ZEN eq 443

! --- Zscaler tunnels from the egress routers (192.0.2.0/29) ----------------
access-list OUTSIDE-EGRESS extended permit gre 192.0.2.0 255.255.255.248 object-group ZSCALER_ZEN
access-list OUTSIDE-EGRESS extended permit udp 192.0.2.0 255.255.255.248 object-group ZSCALER_ZEN eq isakmp

! --- NTP for the edge estate ------------------------------------------------
access-list OUTSIDE-EGRESS extended permit udp object-group CORP_USERS host 203.0.113.123 eq ntp

! A leftover from the pre-Zscaler proxy migration — fully covered by the
! object-group rule above. RuleHawk lists it in the Cleanup plan (low).
access-list OUTSIDE-EGRESS extended permit udp 10.20.0.0 255.255.0.0 185.46.212.0 255.255.254.0 eq 443

access-list OUTSIDE-EGRESS extended deny ip any any log
